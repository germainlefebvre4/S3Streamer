<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Video Streaming</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      /* max-width: 90%; */
      max-width: var(--page-max-width, 1200px);
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .video-list {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols, 6), minmax(200px, 1fr));
      gap: 20px;
    }
    .video-item {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }
    .video-item:hover {
      transform: translateY(-5px);
    }
    .video-name {
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loading {
      text-align: center;
      font-size: 18px;
      margin: 40px 0;
    }
    .video-details {
      color: #666;
      font-size: 14px;
    }
    /* Toolbar (search + config button) */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toolbar .search-container {
      flex: 1;
    }
    .config-btn {
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      padding: 8px 12px;
      color: #555;
      flex-shrink: 0;
    }
    .config-btn:hover {
      background: #e8e8e8;
    }
    /* Search field */
    .search-container {
      display: flex;
      justify-content: center;
    }
    .search-input {
      width: 100%;
      max-width: 500px;
      padding: 10px 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      box-sizing: border-box;
    }
    .search-input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }
    /* New styles for pagination */
    .pagination {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 10px;
    }
    .pagination button {
      padding: 8px 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }
    .pagination-ellipsis {
      line-height: 35px;
      padding: 0 4px;
      color: #666;
    }
    .pagination-info {
      margin: 0 15px;
      line-height: 35px;
    }
    .page-button {
      font-weight: normal;
      background: #f0f0f0;
      color: #333;
    }
    .page-button.active {
      font-weight: bold;
      background: #4CAF50;
      color: white;
    }
    /* Grid config modal */
    .config-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .config-modal {
      background: white;
      border-radius: 8px;
      padding: 30px;
      min-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .config-modal h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
    }
    .config-modal label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
    }
    .config-modal select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    .config-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .config-modal-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-apply {
      background: #4CAF50;
      color: white;
    }
    .btn-cancel {
      background: #f0f0f0;
      color: #333;
    }
    /* Full page dialog styles */
    .video-dialog {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .video-container {
      width: 90%;
      max-width: 80%;
      /* max-width: 1200px; */
    }
    .video-player-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 aspect ratio */
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .video-dialog-header {
      width: 90%;
      max-width: 1200px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .video-dialog-title {
      font-size: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .close-button {
      background: transparent;
      color: white;
      font-size: 24px;
      border: none;
      cursor: pointer;
      padding: 10px;
    }
    /* Make page not scrollable when dialog open */
    body.dialog-open {
      overflow: hidden;
    }
    /* Tags section */
    .tags-section {
      margin-top: 10px;
      padding: 16px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .tags-section h2 {
      font-size: 14px;
      color: #777;
      margin: 0 0 12px 0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      color: #2e7d32;
    }
    .tag-badge:hover {
      background: #4CAF50;
      border-color: #388e3c;
      color: white;
    }
    .tag-count {
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>S3 Video Streaming</h1>

  <div class="container">
    <div id="loading" class="loading">Loading videos from S3...</div>

    <div class="toolbar">
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Rechercher une vidéo…">
      </div>
      <button id="config-btn" class="config-btn" title="Configuration de la grille">⚙</button>
    </div>

    <div id="pagination" class="pagination"></div>

    <div id="video-list" class="video-list"></div>

    <div id="tags-section" class="tags-section" style="display:none;">
      <h2>Tags</h2>
      <div id="tags-list" class="tags-list"></div>
    </div>
  </div>

  <!-- Grid config modal -->
  <div id="config-modal-overlay" class="config-modal-overlay">
    <div class="config-modal">
      <h2>Configuration de la grille</h2>
      <label for="config-cols">Colonnes</label>
      <select id="config-cols">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <label for="config-rows">Lignes par page</label>
      <select id="config-rows">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
      <label for="config-width">Largeur de la page</label>
      <select id="config-width">
        <option value="900px">900px</option>
        <option value="1200px">1200px</option>
        <option value="1400px">1400px</option>
        <option value="1600px">1600px</option>
        <option value="100%">Pleine largeur</option>
      </select>
      <div class="config-modal-actions">
        <button id="config-cancel" class="btn-cancel">Annuler</button>
        <button id="config-apply" class="btn-apply">Appliquer</button>
      </div>
    </div>
  </div>

  <!-- Full page video dialog -->
  <div id="video-dialog" class="video-dialog">
    <div class="video-dialog-header">
      <div id="video-dialog-title" class="video-dialog-title"></div>
      <button id="close-dialog-button" class="close-button">×</button>
    </div>
    <div class="video-container">
      <div class="video-player-wrapper">
        <video id="video-player" controls autoplay></video>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const videoList = document.getElementById('video-list');
      const videoDialog = document.getElementById('video-dialog');
      const videoPlayer = document.getElementById('video-player');
      const videoDialogTitle = document.getElementById('video-dialog-title');
      const closeDialogButton = document.getElementById('close-dialog-button');
      const loadingElement = document.getElementById('loading');
      const paginationElement = document.getElementById('pagination');
      const searchInput = document.getElementById('search-input');
      const configBtn = document.getElementById('config-btn');
      const configModalOverlay = document.getElementById('config-modal-overlay');
      const configColsSelect = document.getElementById('config-cols');
      const configRowsSelect = document.getElementById('config-rows');
      const configApplyBtn = document.getElementById('config-apply');
      const configCancelBtn = document.getElementById('config-cancel');
      const configWidthSelect = document.getElementById('config-width');

      // Grid config: defaults, localStorage and CSS init
      const GRID_CONFIG_KEY = 's3streamer_grid_config';
      const GRID_DEFAULTS = { cols: 6, rows: 3, width: '1200px' };
      const loadGridConfig = () => {
        try {
          const stored = localStorage.getItem(GRID_CONFIG_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            if (typeof parsed.cols === 'number' && typeof parsed.rows === 'number') {
              return { ...GRID_DEFAULTS, ...parsed };
            }
          }
        } catch (_) {}
        return { ...GRID_DEFAULTS };
      };
      let gridConfig = loadGridConfig();
      document.documentElement.style.setProperty('--grid-cols', gridConfig.cols);
      document.documentElement.style.setProperty('--page-max-width', gridConfig.width);

      // Current state
      let currentPage = 1;
      let totalPages = 1;
      let currentSearch = '';
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('page')) {
        currentPage = parseInt(urlParams.get('page')) || 1;
      }
      if (urlParams.has('search')) {
        currentSearch = urlParams.get('search') || '';
        searchInput.value = currentSearch;
      }

      // Fetch videos from our API with pagination
      const fetchVideos = async (page = 1) => {
        try {
          loadingElement.style.display = 'block';
          videoList.innerHTML = '';
          paginationElement.innerHTML = '';

          const params = new URLSearchParams({ page, pageSize: gridConfig.cols * gridConfig.rows });
          if (currentSearch) params.set('search', currentSearch);
          const response = await fetch(`/api/videos?${params}`);
          if (!response.ok) {
            throw new Error('Failed to fetch videos');
          }

          const data = await response.json();
          const videos = data.videos;

          if (videos.length === 0) {
            loadingElement.textContent = 'No videos found in the S3 bucket.';
            return;
          }

          loadingElement.style.display = 'none';

          // Create video list items
          videos.forEach(video => {
            const videoItem = document.createElement('div');
            videoItem.className = 'video-item';

            // Extract filename from the key
            const fileName = video.key.split('/').pop();

            // Format file size
            const fileSizeInMB = (video.size / (1024 * 1024)).toFixed(2);

            // Format date
            const formattedDate = new Date(video.lastModified).toLocaleDateString();

            videoItem.innerHTML = `
              <div class="video-name">${fileName}</div>
              <div class="video-details">
                <div>Size: ${fileSizeInMB} MB</div>
                <div>Modified: ${formattedDate}</div>
              </div>
            `;

            videoItem.addEventListener('click', () => {
              openVideoDialog(video.streamUrl, fileName);
            });

            videoList.appendChild(videoItem);
          });

          // Update pagination
          updatePagination(data.pagination);

          // Update browser URL with current page
          updateURLWithPage(page);

        } catch (error) {
          console.error('Error fetching videos:', error);
          loadingElement.textContent = 'Error loading videos. Please try again later.';
        }
      };

      // Update URL with current page and search as query parameters
      const updateURLWithPage = (page) => {
        const url = new URL(window.location);
        if (page === 1) {
          url.searchParams.delete('page');
        } else {
          url.searchParams.set('page', page);
        }
        if (currentSearch) {
          url.searchParams.set('search', currentSearch);
        } else {
          url.searchParams.delete('search');
        }
        window.history.replaceState({}, '', url);
      };

      // Build the list of page numbers/ellipses to display
      const getPageNumbers = (current, total) => {
        if (total <= 5) {
          return Array.from({ length: total }, (_, i) => i + 1);
        }
        const delta = 2;
        const pages = new Set([1, total]);
        for (let i = current - delta; i <= current + delta; i++) {
          if (i >= 1 && i <= total) pages.add(i);
        }
        const sorted = [...pages].sort((a, b) => a - b);
        const result = [];
        let prev = null;
        for (const p of sorted) {
          if (prev !== null && p - prev > 1) result.push('…');
          result.push(p);
          prev = p;
        }
        return result;
      };

      // Create pagination controls
      const updatePagination = (pagination) => {
        currentPage = pagination.page;
        totalPages = pagination.totalPages;

        if (totalPages <= 1) {
          return; // Don't show pagination for single page
        }

        // Previous button
        const prevButton = document.createElement('button');
        prevButton.textContent = '« Previous';
        prevButton.disabled = !pagination.hasPrevPage;
        prevButton.addEventListener('click', () => {
          if (pagination.hasPrevPage) fetchVideos(currentPage - 1);
        });
        paginationElement.appendChild(prevButton);

        // Numbered page buttons with ellipses
        getPageNumbers(currentPage, totalPages).forEach(item => {
          if (item === '…') {
            const ellipsis = document.createElement('span');
            ellipsis.textContent = '…';
            ellipsis.className = 'pagination-ellipsis';
            paginationElement.appendChild(ellipsis);
          } else {
            const btn = document.createElement('button');
            btn.textContent = item;
            btn.className = 'page-button' + (item === currentPage ? ' active' : '');
            btn.disabled = item === currentPage;
            btn.addEventListener('click', () => fetchVideos(item));
            paginationElement.appendChild(btn);
          }
        });

        // Next button
        const nextButton = document.createElement('button');
        nextButton.textContent = 'Next »';
        nextButton.disabled = !pagination.hasNextPage;
        nextButton.addEventListener('click', () => {
          if (pagination.hasNextPage) fetchVideos(currentPage + 1);
        });
        paginationElement.appendChild(nextButton);
      };

      // Open video dialog
      const openVideoDialog = (streamUrl, title) => {
        // Update the video player source
        videoPlayer.src = streamUrl;
        videoDialogTitle.textContent = title;

        // Show the video dialog
        videoDialog.style.display = 'flex';
        document.body.classList.add('dialog-open');

        // Set page title to video name
        document.title = `Playing: ${title} | S3 Video Streaming`;
      };

      // Close video dialog
      const closeVideoDialog = () => {
        // Stop video playback
        videoPlayer.pause();
        videoPlayer.src = '';

        // Hide the video dialog
        videoDialog.style.display = 'none';
        document.body.classList.remove('dialog-open');

        // Reset page title
        document.title = 'S3 Video Streaming';
      };

      // Close dialog when clicking close button
      closeDialogButton.addEventListener('click', closeVideoDialog);

      // Also close when clicking outside video (on the dark overlay)
      videoDialog.addEventListener('click', (event) => {
        if (event.target === videoDialog) {
          closeVideoDialog();
        }
      });

      // Close dialog on escape key
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (videoDialog.style.display === 'flex') closeVideoDialog();
          else if (configModalOverlay.style.display === 'flex') closeConfigModal();
        }
      });

      // Grid config modal
      const openConfigModal = () => {
        configColsSelect.value = gridConfig.cols;
        configRowsSelect.value = gridConfig.rows;
        configWidthSelect.value = gridConfig.width;
        configModalOverlay.style.display = 'flex';
        document.body.classList.add('dialog-open');
      };
      const closeConfigModal = () => {
        configModalOverlay.style.display = 'none';
        document.body.classList.remove('dialog-open');
      };

      configBtn.addEventListener('click', openConfigModal);
      configCancelBtn.addEventListener('click', closeConfigModal);
      configModalOverlay.addEventListener('click', (event) => {
        if (event.target === configModalOverlay) closeConfigModal();
      });
      configApplyBtn.addEventListener('click', () => {
        gridConfig = {
          cols: parseInt(configColsSelect.value),
          rows: parseInt(configRowsSelect.value),
          width: configWidthSelect.value
        };
        localStorage.setItem(GRID_CONFIG_KEY, JSON.stringify(gridConfig));
        document.documentElement.style.setProperty('--grid-cols', gridConfig.cols);
        document.documentElement.style.setProperty('--page-max-width', gridConfig.width);
        closeConfigModal();
        fetchVideos(1);
      });

      // Fetch and render tag panel
      const tagsSection = document.getElementById('tags-section');
      const tagsList = document.getElementById('tags-list');
      const fetchTags = async () => {
        try {
          const response = await fetch('/api/videos/tags');
          if (!response.ok) return;
          const data = await response.json();
          if (!data.tags || data.tags.length === 0) {
            tagsSection.style.display = 'none';
            return;
          }
          tagsList.innerHTML = '';
          data.tags.forEach(({ word, count }) => {
            const badge = document.createElement('button');
            badge.className = 'tag-badge';
            badge.innerHTML = `${word} <span class="tag-count">(${count})</span>`;
            badge.addEventListener('click', () => {
              currentSearch = word;
              searchInput.value = word;
              fetchVideos(1);
            });
            tagsList.appendChild(badge);
          });
          tagsSection.style.display = '';
        } catch (error) {
          console.error('Error fetching tags:', error);
        }
      };

      // Debounce search input: reset to page 1 on each new query
      let searchDebounceTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
          currentSearch = searchInput.value.trim();
          fetchVideos(1);
        }, 300);
      });

      // Initialize the app with the page and search from URL or defaults
      fetchVideos(currentPage);
      fetchTags();
    });
  </script>
</body>
</html>
