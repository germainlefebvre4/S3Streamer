<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Video Streaming</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      /* max-width: 90%; */
      max-width: var(--page-max-width, 1200px);
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .video-list {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols, 6), minmax(200px, 1fr));
      gap: 20px;
    }
    .video-item {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }
    .video-item:hover {
      transform: translateY(-5px);
    }
    .video-name {
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loading {
      text-align: center;
      font-size: 18px;
      margin: 40px 0;
    }
    .video-details {
      color: #666;
      font-size: 14px;
    }
    /* Toolbar (search + config button) */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toolbar .search-container {
      flex: 1;
    }
    .config-btn {
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      padding: 8px 12px;
      color: #555;
      flex-shrink: 0;
    }
    .config-btn:hover {
      background: #e8e8e8;
    }
    .config-btn.active {
      background: #4CAF50;
      color: white;
      border-color: #388e3c;
    }
    .config-btn.active:hover {
      background: #43a047;
    }
    /* Search field */
    .search-container {
      display: flex;
      justify-content: center;
    }
    .search-input {
      width: 100%;
      max-width: 500px;
      padding: 10px 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      box-sizing: border-box;
    }
    .search-input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }
    /* New styles for pagination */
    .pagination {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 10px;
    }
    .pagination button {
      padding: 8px 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }
    .pagination-ellipsis {
      line-height: 35px;
      padding: 0 4px;
      color: #666;
    }
    .pagination-info {
      margin: 0 15px;
      line-height: 35px;
    }
    .page-button {
      font-weight: normal;
      background: #f0f0f0;
      color: #333;
    }
    .page-button.active {
      font-weight: bold;
      background: #4CAF50;
      color: white;
    }
    /* Grid config modal */
    .config-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .config-modal {
      background: white;
      border-radius: 8px;
      padding: 30px;
      min-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .config-modal h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
    }
    .config-modal label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
    }
    .config-modal select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    .config-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .config-modal-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-apply {
      background: #4CAF50;
      color: white;
    }
    .btn-cancel {
      background: #f0f0f0;
      color: #333;
    }
    /* Full page dialog styles */
    .video-dialog {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .video-container {
      width: 90%;
      max-width: 80%;
      /* max-width: 1200px; */
    }
    .video-player-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 aspect ratio */
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .video-dialog-header {
      width: 90%;
      max-width: 1200px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .video-dialog-title {
      font-size: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .close-button {
      background: transparent;
      color: white;
      font-size: 24px;
      border: none;
      cursor: pointer;
      padding: 10px;
    }
    .delete-button {
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 20px;
      border: none;
      cursor: pointer;
      padding: 10px;
      transition: color 0.2s;
    }
    .delete-button:hover {
      color: #ef5350;
    }
    /* Delete confirmation modal */
    .delete-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .delete-modal {
      background: white;
      border-radius: 8px;
      padding: 30px;
      min-width: 320px;
      max-width: 480px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .delete-modal h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #333;
    }
    .delete-modal p {
      margin: 0 0 24px 0;
      color: #555;
      font-size: 14px;
      word-break: break-all;
    }
    .delete-modal p strong {
      color: #222;
    }
    .delete-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .delete-modal-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-delete-confirm {
      background: #e53935;
      color: white;
    }
    .btn-delete-confirm:hover {
      background: #c62828;
    }
    .btn-delete-cancel {
      background: #f0f0f0;
      color: #333;
    }
    /* Make page not scrollable when dialog open */
    body.dialog-open {
      overflow: hidden;
    }
    /* Tags section */
    .tags-section {
      margin-top: 10px;
      padding: 16px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .tags-section h2 {
      font-size: 14px;
      color: #777;
      margin: 0 0 12px 0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      color: #2e7d32;
    }
    .tag-badge:hover {
      background: #4CAF50;
      border-color: #388e3c;
      color: white;
    }
    .tag-count {
      font-size: 11px;
      opacity: 0.7;
    }
    /* Nav button zones - Netflix style */
    .nav-btn {
      position: absolute;
      top: 0;
      height: 100%;
      width: 10%;
      min-width: 60px;
      max-width: 120px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.25;
      transition: opacity 0.2s, background 0.2s;
      z-index: 10;
    }
    .nav-btn:hover:not(:disabled) {
      opacity: 1;
    }
    .nav-btn:disabled {
      opacity: 0;
      pointer-events: none;
    }
    .nav-prev {
      left: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.35), transparent);
    }
    .nav-next {
      right: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.35), transparent);
    }
    .nav-prev:hover:not(:disabled) {
      background: linear-gradient(to right, rgba(0,0,0,0.55), transparent);
    }
    .nav-next:hover:not(:disabled) {
      background: linear-gradient(to left, rgba(0,0,0,0.55), transparent);
    }
    .nav-btn svg {
      width: 36px;
      height: 36px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
    }
    .nav-btn.loading svg {
      animation: nav-pulse 0.8s ease-in-out infinite;
    }
    @keyframes nav-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    /* Dialog shuffle button */
    .dialog-shuffle-btn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: default;
      transition: all 0.2s;
    }
    .dialog-shuffle-btn.shuffle-active {
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .dialog-shuffle-btn.shuffle-active:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
      color: white;
    }
  </style>
</head>
<body>
  <h1>S3 Video Streaming</h1>

  <div class="container">
    <div id="loading" class="loading">Loading videos from S3...</div>

    <div class="toolbar">
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Rechercher une vidéo…">
      </div>
      <button id="shuffle-btn" class="config-btn" title="Mode aléatoire">🔀</button>
      <button id="config-btn" class="config-btn" title="Configuration de la grille">⚙</button>
    </div>

    <div id="pagination" class="pagination"></div>

    <div id="video-list" class="video-list"></div>

    <div id="tags-section" class="tags-section" style="display:none;">
      <h2>Tags</h2>
      <div id="tags-list" class="tags-list"></div>
    </div>
  </div>

  <!-- Grid config modal -->
  <div id="config-modal-overlay" class="config-modal-overlay">
    <div class="config-modal">
      <h2>Configuration de la grille</h2>
      <label for="config-cols">Colonnes</label>
      <select id="config-cols">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <label for="config-rows">Lignes par page</label>
      <select id="config-rows">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
      <label for="config-width">Largeur de la page</label>
      <select id="config-width">
        <option value="900px">900px</option>
        <option value="1200px">1200px</option>
        <option value="1400px">1400px</option>
        <option value="1600px">1600px</option>
        <option value="100%">Pleine largeur</option>
      </select>
      <div class="config-modal-actions">
        <button id="config-cancel" class="btn-cancel">Annuler</button>
        <button id="config-apply" class="btn-apply">Appliquer</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation modal -->
  <div id="delete-modal-overlay" class="delete-modal-overlay">
    <div class="delete-modal">
      <h2>Supprimer définitivement ?</h2>
      <p>La vidéo <strong id="delete-modal-filename"></strong> sera supprimée du stockage distant. Cette action est irréversible.</p>
      <div class="delete-modal-actions">
        <button id="delete-cancel-btn" class="btn-delete-cancel">Annuler</button>
        <button id="delete-confirm-btn" class="btn-delete-confirm">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Full page video dialog -->
  <div id="video-dialog" class="video-dialog">
    <button id="nav-prev-btn" class="nav-btn nav-prev" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <button id="nav-next-btn" class="nav-btn nav-next" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
    </button>
    <div class="video-dialog-header">
      <div id="video-dialog-title" class="video-dialog-title"></div>
      <button id="delete-video-button" class="delete-button" title="Supprimer la vidéo">🗑</button>
      <button id="close-dialog-button" class="close-button">×</button>
    </div>
    <div class="video-container">
      <div class="video-player-wrapper">
        <video id="video-player" controls autoplay></video>
      </div>
    </div>
    <button id="dialog-shuffle-btn" class="dialog-shuffle-btn" disabled>🎲 Vidéo au hasard</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const videoList = document.getElementById('video-list');
      const videoDialog = document.getElementById('video-dialog');
      const videoPlayer = document.getElementById('video-player');
      const videoDialogTitle = document.getElementById('video-dialog-title');
      const closeDialogButton = document.getElementById('close-dialog-button');
      const loadingElement = document.getElementById('loading');
      const paginationElement = document.getElementById('pagination');
      const searchInput = document.getElementById('search-input');
      const configBtn = document.getElementById('config-btn');
      const configModalOverlay = document.getElementById('config-modal-overlay');
      const configColsSelect = document.getElementById('config-cols');
      const configRowsSelect = document.getElementById('config-rows');
      const configApplyBtn = document.getElementById('config-apply');
      const configCancelBtn = document.getElementById('config-cancel');
      const configWidthSelect = document.getElementById('config-width');
      const shuffleBtn = document.getElementById('shuffle-btn');
      const navPrevBtn = document.getElementById('nav-prev-btn');
      const navNextBtn = document.getElementById('nav-next-btn');
      const dialogShuffleBtn = document.getElementById('dialog-shuffle-btn');
      const deleteVideoButton = document.getElementById('delete-video-button');
      const deleteModalOverlay = document.getElementById('delete-modal-overlay');
      const deleteModalFilename = document.getElementById('delete-modal-filename');
      const deleteConfirmBtn = document.getElementById('delete-confirm-btn');
      const deleteCancelBtn = document.getElementById('delete-cancel-btn');

      // Grid config: defaults, localStorage and CSS init
      const GRID_CONFIG_KEY = 's3streamer_grid_config';
      const GRID_DEFAULTS = { cols: 6, rows: 3, width: '1200px' };
      const loadGridConfig = () => {
        try {
          const stored = localStorage.getItem(GRID_CONFIG_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            if (typeof parsed.cols === 'number' && typeof parsed.rows === 'number') {
              return { ...GRID_DEFAULTS, ...parsed };
            }
          }
        } catch (_) {}
        return { ...GRID_DEFAULTS };
      };
      let gridConfig = loadGridConfig();
      document.documentElement.style.setProperty('--grid-cols', gridConfig.cols);
      document.documentElement.style.setProperty('--page-max-width', gridConfig.width);

      // Current state
      let currentPage = 1;
      let totalPages = 1;
      let currentSearch = '';
      let shuffleMode = false;

      // Dialog navigation state
      let dialogBuffer = [];
      let dialogAbsoluteIndex = -1;
      let dialogContext = null;
      let isLoadingPage = false;
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('page')) {
        currentPage = parseInt(urlParams.get('page')) || 1;
      }
      if (urlParams.has('search')) {
        currentSearch = urlParams.get('search') || '';
        searchInput.value = currentSearch;
      }

      // Fetch videos from our API with pagination
      const fetchVideos = async (page = 1) => {
        try {
          loadingElement.style.display = 'block';
          videoList.innerHTML = '';
          paginationElement.innerHTML = '';

          const params = new URLSearchParams({ page, pageSize: gridConfig.cols * gridConfig.rows });
          if (currentSearch) params.set('search', currentSearch);
          if (shuffleMode) params.set('shuffle', 'true');
          const response = await fetch(`/api/videos?${params}`);
          if (!response.ok) {
            throw new Error('Failed to fetch videos');
          }

          const data = await response.json();
          const videos = data.videos;

          if (videos.length === 0) {
            loadingElement.textContent = 'No videos found in the S3 bucket.';
            return;
          }

          loadingElement.style.display = 'none';

          // Create video list items
          videos.forEach((video, index) => {
            const videoItem = document.createElement('div');
            videoItem.className = 'video-item';
            videoItem.dataset.videoKey = video.key;

            // Extract filename from the key
            const fileName = video.key.split('/').pop();

            // Format file size
            const fileSizeInMB = (video.size / (1024 * 1024)).toFixed(2);

            // Format date
            const formattedDate = new Date(video.lastModified).toLocaleDateString();

            videoItem.innerHTML = `
              <div class="video-name">${fileName}</div>
              <div class="video-details">
                <div>Size: ${fileSizeInMB} MB</div>
                <div>Modified: ${formattedDate}</div>
              </div>
            `;

            videoItem.addEventListener('click', () => {
              openVideoDialog(video, index, videos, data.pagination.totalPages, page);
            });

            videoList.appendChild(videoItem);
          });

          // Update pagination
          updatePagination(data.pagination);

          // Update browser URL with current page
          updateURLWithPage(page);

        } catch (error) {
          console.error('Error fetching videos:', error);
          loadingElement.textContent = 'Error loading videos. Please try again later.';
        }
      };

      // Update URL with current page and search as query parameters
      const updateURLWithPage = (page) => {
        const url = new URL(window.location);
        if (page === 1) {
          url.searchParams.delete('page');
        } else {
          url.searchParams.set('page', page);
        }
        if (currentSearch) {
          url.searchParams.set('search', currentSearch);
        } else {
          url.searchParams.delete('search');
        }
        window.history.replaceState({}, '', url);
      };

      // Build the list of page numbers/ellipses to display
      const getPageNumbers = (current, total) => {
        if (total <= 5) {
          return Array.from({ length: total }, (_, i) => i + 1);
        }
        const delta = 2;
        const pages = new Set([1, total]);
        for (let i = current - delta; i <= current + delta; i++) {
          if (i >= 1 && i <= total) pages.add(i);
        }
        const sorted = [...pages].sort((a, b) => a - b);
        const result = [];
        let prev = null;
        for (const p of sorted) {
          if (prev !== null && p - prev > 1) result.push('…');
          result.push(p);
          prev = p;
        }
        return result;
      };

      // Shuffle toggle
      shuffleBtn.addEventListener('click', () => {
        shuffleMode = !shuffleMode;
        shuffleBtn.classList.toggle('active', shuffleMode);
        fetchVideos(1);
      });

      // Create pagination controls
      const updatePagination = (pagination) => {
        currentPage = pagination.page;
        totalPages = pagination.totalPages;

        if (shuffleMode) {
          const rerollBtn = document.createElement('button');
          rerollBtn.textContent = '🔀 Nouveau tirage';
          rerollBtn.addEventListener('click', () => fetchVideos(1));
          paginationElement.appendChild(rerollBtn);
          return;
        }

        if (totalPages <= 1) {
          return; // Don't show pagination for single page
        }

        // Previous button
        const prevButton = document.createElement('button');
        prevButton.textContent = '« Previous';
        prevButton.disabled = !pagination.hasPrevPage;
        prevButton.addEventListener('click', () => {
          if (pagination.hasPrevPage) fetchVideos(currentPage - 1);
        });
        paginationElement.appendChild(prevButton);

        // Numbered page buttons with ellipses
        getPageNumbers(currentPage, totalPages).forEach(item => {
          if (item === '…') {
            const ellipsis = document.createElement('span');
            ellipsis.textContent = '…';
            ellipsis.className = 'pagination-ellipsis';
            paginationElement.appendChild(ellipsis);
          } else {
            const btn = document.createElement('button');
            btn.textContent = item;
            btn.className = 'page-button' + (item === currentPage ? ' active' : '');
            btn.disabled = item === currentPage;
            btn.addEventListener('click', () => fetchVideos(item));
            paginationElement.appendChild(btn);
          }
        });

        // Next button
        const nextButton = document.createElement('button');
        nextButton.textContent = 'Next »';
        nextButton.disabled = !pagination.hasNextPage;
        nextButton.addEventListener('click', () => {
          if (pagination.hasNextPage) fetchVideos(currentPage + 1);
        });
        paginationElement.appendChild(nextButton);
      };

      // Play video at the given buffer index
      const playVideoAtIndex = (index) => {
        const video = dialogBuffer[index];
        const fileName = video.key.split('/').pop();
        videoPlayer.src = video.streamUrl;
        videoDialogTitle.textContent = fileName;
        document.title = `Playing: ${fileName} | S3 Video Streaming`;
        updateNavButtons();
      };

      // Sync nav button disabled state
      const updateNavButtons = () => {
        navPrevBtn.disabled = dialogAbsoluteIndex === 0;
        const atEnd = dialogAbsoluteIndex === dialogBuffer.length - 1;
        const noMorePages = !dialogContext || dialogContext.shuffleMode ||
                            dialogContext.currentLoadedPage >= dialogContext.totalPages;
        navNextBtn.disabled = atEnd && noMorePages;
      };

      // Sync shuffle button appearance
      const updateShuffleBtn = () => {
        if (shuffleMode) {
          dialogShuffleBtn.disabled = false;
          dialogShuffleBtn.classList.add('shuffle-active');
        } else {
          dialogShuffleBtn.disabled = true;
          dialogShuffleBtn.classList.remove('shuffle-active');
        }
      };

      // Navigate to prev/next video in the dialog buffer
      const navigateDialog = async (direction) => {
        if (isLoadingPage) return;
        if (direction === 'prev') {
          if (dialogAbsoluteIndex > 0) {
            dialogAbsoluteIndex--;
            playVideoAtIndex(dialogAbsoluteIndex);
          }
        } else {
          if (dialogAbsoluteIndex < dialogBuffer.length - 1) {
            dialogAbsoluteIndex++;
            playVideoAtIndex(dialogAbsoluteIndex);
          } else if (dialogContext && !dialogContext.shuffleMode &&
                     dialogContext.currentLoadedPage < dialogContext.totalPages) {
            isLoadingPage = true;
            navNextBtn.classList.add('loading');
            try {
              const nextPage = dialogContext.currentLoadedPage + 1;
              const params = new URLSearchParams({ page: nextPage, pageSize: dialogContext.pageSize });
              if (dialogContext.searchQuery) params.set('search', dialogContext.searchQuery);
              const response = await fetch(`/api/videos?${params}`);
              if (!response.ok) throw new Error('Failed to fetch next page');
              const data = await response.json();
              dialogBuffer.push(...data.videos);
              dialogContext.currentLoadedPage = nextPage;
              dialogContext.totalPages = data.pagination.totalPages;
              dialogAbsoluteIndex++;
              playVideoAtIndex(dialogAbsoluteIndex);
            } catch (e) {
              console.error('Error loading next page:', e);
            } finally {
              isLoadingPage = false;
              navNextBtn.classList.remove('loading');
            }
          }
        }
      };

      // Open video dialog
      const openVideoDialog = (video, index, allVideos, total, loadedPage) => {
        dialogBuffer = [...allVideos];
        dialogAbsoluteIndex = index;
        dialogContext = {
          searchQuery: currentSearch,
          shuffleMode,
          pageSize: gridConfig.cols * gridConfig.rows,
          totalPages: total,
          currentLoadedPage: loadedPage
        };
        playVideoAtIndex(index);
        videoDialog.style.display = 'flex';
        document.body.classList.add('dialog-open');
        updateShuffleBtn();
      };

      // Close video dialog
      const closeVideoDialog = () => {
        videoPlayer.pause();
        videoPlayer.src = '';
        videoDialog.style.display = 'none';
        document.body.classList.remove('dialog-open');
        document.title = 'S3 Video Streaming';
        dialogBuffer = [];
        dialogAbsoluteIndex = -1;
        dialogContext = null;
      };

      // Open delete confirmation modal
      const openDeleteModal = () => {
        const video = dialogBuffer[dialogAbsoluteIndex];
        if (!video) return;
        const fileName = video.key.split('/').pop();
        deleteModalFilename.textContent = fileName;
        deleteModalOverlay.style.display = 'flex';
      };

      // Close delete confirmation modal
      const closeDeleteModal = () => {
        deleteModalOverlay.style.display = 'none';
      };

      // Delete current video: call API, update buffer + grid, navigate
      const deleteCurrentVideo = async () => {
        const video = dialogBuffer[dialogAbsoluteIndex];
        if (!video) return;
        closeDeleteModal();
        try {
          const response = await fetch(`/api/videos/${encodeURIComponent(video.key)}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Delete failed');

          // Remove the card from the grid immediately
          const cards = videoList.querySelectorAll('.video-item');
          cards.forEach(card => {
            if (card.dataset.videoKey === video.key) card.remove();
          });

          // Remove from buffer and navigate
          dialogBuffer.splice(dialogAbsoluteIndex, 1);

          if (dialogBuffer.length === 0) {
            closeVideoDialog();
          } else if (dialogAbsoluteIndex < dialogBuffer.length) {
            // There is a next video — stay at same index (it now points to next)
            playVideoAtIndex(dialogAbsoluteIndex);
          } else {
            // Was the last — go to previous
            dialogAbsoluteIndex--;
            playVideoAtIndex(dialogAbsoluteIndex);
          }
        } catch (e) {
          console.error('Error deleting video:', e);
          alert('Erreur lors de la suppression. Veuillez réessayer.');
        }
      };

      // Close dialog when clicking close button
      closeDialogButton.addEventListener('click', closeVideoDialog);

      // Delete button opens confirmation modal
      deleteVideoButton.addEventListener('click', openDeleteModal);

      // Delete modal: cancel and overlay click
      deleteCancelBtn.addEventListener('click', closeDeleteModal);
      deleteModalOverlay.addEventListener('click', (event) => {
        if (event.target === deleteModalOverlay) closeDeleteModal();
      });

      // Delete modal: confirm
      deleteConfirmBtn.addEventListener('click', deleteCurrentVideo);

      // Also close when clicking outside video (on the dark overlay)
      videoDialog.addEventListener('click', (event) => {
        if (event.target === videoDialog) {
          closeVideoDialog();
        }
      });

      navPrevBtn.addEventListener('click', () => navigateDialog('prev'));
      navNextBtn.addEventListener('click', () => navigateDialog('next'));

      dialogShuffleBtn.addEventListener('click', async () => {
        if (!shuffleMode || !dialogContext) return;
        try {
          const params = new URLSearchParams({ shuffle: 'true', pageSize: dialogContext.pageSize });
          if (dialogContext.searchQuery) params.set('search', dialogContext.searchQuery);
          const response = await fetch(`/api/videos?${params}`);
          if (!response.ok) throw new Error('Failed');
          const data = await response.json();
          dialogBuffer = data.videos;
          dialogAbsoluteIndex = 0;
          dialogContext.currentLoadedPage = 1;
          dialogContext.totalPages = data.pagination.totalPages;
          playVideoAtIndex(0);
        } catch (e) {
          console.error('Error loading random video:', e);
        }
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (deleteModalOverlay.style.display === 'flex') closeDeleteModal();
          else if (videoDialog.style.display === 'flex') closeVideoDialog();
          else if (configModalOverlay.style.display === 'flex') closeConfigModal();
        }
        if (videoDialog.style.display === 'flex' && event.ctrlKey) {
          if (event.key === 'ArrowRight') { event.preventDefault(); navigateDialog('next'); }
          else if (event.key === 'ArrowLeft') { event.preventDefault(); navigateDialog('prev'); }
        }
      });

      // Grid config modal
      const openConfigModal = () => {
        configColsSelect.value = gridConfig.cols;
        configRowsSelect.value = gridConfig.rows;
        configWidthSelect.value = gridConfig.width;
        configModalOverlay.style.display = 'flex';
        document.body.classList.add('dialog-open');
      };
      const closeConfigModal = () => {
        configModalOverlay.style.display = 'none';
        document.body.classList.remove('dialog-open');
      };

      configBtn.addEventListener('click', openConfigModal);
      configCancelBtn.addEventListener('click', closeConfigModal);
      configModalOverlay.addEventListener('click', (event) => {
        if (event.target === configModalOverlay) closeConfigModal();
      });
      configApplyBtn.addEventListener('click', () => {
        gridConfig = {
          cols: parseInt(configColsSelect.value),
          rows: parseInt(configRowsSelect.value),
          width: configWidthSelect.value
        };
        localStorage.setItem(GRID_CONFIG_KEY, JSON.stringify(gridConfig));
        document.documentElement.style.setProperty('--grid-cols', gridConfig.cols);
        document.documentElement.style.setProperty('--page-max-width', gridConfig.width);
        closeConfigModal();
        fetchVideos(1);
      });

      // Fetch and render tag panel
      const tagsSection = document.getElementById('tags-section');
      const tagsList = document.getElementById('tags-list');
      const fetchTags = async () => {
        try {
          const response = await fetch('/api/videos/tags');
          if (!response.ok) return;
          const data = await response.json();
          if (!data.tags || data.tags.length === 0) {
            tagsSection.style.display = 'none';
            return;
          }
          tagsList.innerHTML = '';
          data.tags.forEach(({ word, count }) => {
            const badge = document.createElement('button');
            badge.className = 'tag-badge';
            badge.innerHTML = `${word} <span class="tag-count">(${count})</span>`;
            badge.addEventListener('click', () => {
              currentSearch = word;
              searchInput.value = word;
              fetchVideos(1);
            });
            tagsList.appendChild(badge);
          });
          tagsSection.style.display = '';
        } catch (error) {
          console.error('Error fetching tags:', error);
        }
      };

      // Debounce search input: reset to page 1 on each new query
      let searchDebounceTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
          currentSearch = searchInput.value.trim();
          fetchVideos(1);
        }, 300);
      });

      // Initialize the app with the page and search from URL or defaults
      fetchVideos(currentPage);
      fetchTags();
    });
  </script>
</body>
</html>
